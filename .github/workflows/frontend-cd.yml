# week08/.github/workflows/frontend-cd.yml

name: CD - Deploy Frontend to AKS

# This workflow can be called by other workflows and takes inputs.
# Or it can be run manually if you provide the IPs.
on:
  workflow_dispatch:
    inputs:
      product_api_ip:
        description: 'External IP of Product Service'
        required: true
        default: 'http://20.227.67.1:8000'
      order_api_ip:
        description: 'External IP of Order Service (e.g., http://Y.Y.Y.Y:8001)'
        required: true
        default: 'http://40.82.219.126:8001'
      aks_cluster_name:
        description: 'Name of the AKS Cluster to deploy to'
        required: true
        default: 'wk8busayo-aks'
      aks_resource_group:
        description: 'Resource Group of the AKS Cluster'
        required: true
        default: 'wk8busayo-rg'
      aks_acr_name:
        description: 'Name of ACR'
        required: true
        default: 'wk8busayoacr'

  workflow_call:
    inputs:
      product_api_ip:
        required: true
        type: string
      order_api_ip:
        required: true
        type: string
      aks_cluster_name:
        required: true
        type: string
      aks_resource_group:
        required: true
        type: string

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    environment: Production
    
    outputs:
      FRONTEND_IP: ${{ steps.get_frontend_ip.outputs.external_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Azure login using a Service Principal secret
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY }}

      - name: Inject Backend IPs into Frontend main.js
        run: |
          echo "Injecting IPs into frontend/static/js/main.js"
          # Ensure frontend/main.js is directly in the path for sed
          sed -i "s|_PRODUCT_API_URL_|${{ inputs.product_api_ip }}|g" frontend/main.js
          sed -i "s|_ORDER_API_URL_|${{ inputs.order_api_ip }}|g" frontend/main.js
          
          # Display the modified file content for debugging
          echo "--- Modified main.js content ---"
          cat frontend/main.js
          echo "---------------------------------"

      # Build and Push Docker image for Frontend
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/frontend:latest ./frontend/
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/frontend:latest

      - name: Set Kubernetes context (get AKS credentials)
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ inputs.aks_resource_group }}
          cluster-name: ${{ inputs.aks_cluster_name }}

      - name: Deploy Frontend to AKS
        run: |
          echo "Deploying frontend with latest tag to AKS cluster: ${{ inputs.aks_cluster_name }}"
          cd k8s/
          # Ensure frontend-service.yaml is configured with your ACR
          kubectl apply -f frontend.yaml

      - name: Wait for Frontend LoadBalancer IP
        run: |
          echo "Waiting for Frontend LoadBalancer IP to be assigned (up to 5 minutes)..."
          FRONTEND_IP=""
          
          for i in $(seq 1 60); do
            echo "Attempt $i/60 to get IP..."
            FRONTEND_IP=$(kubectl get service frontend-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [[ -n "$FRONTEND_IP" ]]; then
              echo "Frontend LoadBalancer IP assigned!"
              echo "Frontend Service IP: $FRONTEND_IP"
              break
            fi
            sleep 5
          done

          if [[ -z "$FRONTEND_IP" ]]; then
            echo "Error: Frontend LoadBalancer IP not assigned after timeout."
            exit 1
          fi

          echo "FRONTEND_IP=$FRONTEND_IP" >> $GITHUB_ENV

      - name: Capture Frontend Service IP for Workflow Output
        id: get_frontend_ip
        run: echo "external_ip=${{ env.FRONTEND_IP }}" >> $GITHUB_OUTPUT

      - name: Logout from Azure (AKS deployment)
        run: az logout
